    <!-- Load Google API client library for Drive operations -->
    <script src="https://apis.google.com/js/api.js" async defer crossorigin="anonymous"></script>
    <script>
        // Initialize the Google API client library once it's loaded.
        function initGapi() {
            if (window.gapi) {
                // Load the client module.
                window.gapi.load('client', () => {
                    console.log('gapi client loaded');
                });
            } else {
                // Retry after a short delay if gapi is not yet available.
                setTimeout(initGapi, 100);
            }
        }
        // Start initialization after the script is fetched.
        initGapi();
    </script>

    <script>
        window.new_lock = function () {
            var unlock, lock = new Promise((res, rej) => { unlock = res });
            return [lock, unlock];
        };
        window.new_id = function () {
            return `${Date.now()}-${Math.random().toString().replace('.', '')}`;
        };
